<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Full Year Calendar</title> 
    <link href="style.css" rel="stylesheet"> 

    <style>
        .day.actual-day {
            cursor: pointer; 
            transition: background-color 0.2s ease;
        }
        
        .day.actual-day:hover {
            background-color: #f0f0f0; 
        }

        .day.actual-day.selected-day {
            background-color: #fff2bc !important;
            border-radius: 4px;
        }
    </style> 
</head> 
<body> 
<div class="d-flex"> 
    <h1 id="calendar-year">RSVP</h1> 
    <div class="calendar-container" id="calendar-grid"></div> 
    
    <script> 
        const currentYear = new Date().getFullYear(); 
        document.getElementById('calendar-year').textContent = `RSVP for attendance — ${currentYear}`; 
        const monthNames = [ 
            "January", "February", "March", "April", "May", "June", 
            "July", "August", "September", "October", "November", "December" 
        ]; 
        const dayLabels = ["Sun", "Mon", "Tu", "We", "Th", "Fr", "Sa"]; 
        const calendarGrid = document.getElementById('calendar-grid'); 
        
        for (let month = 0; month < 12; month++) { 
            const monthCard = document.createElement('div'); 
            monthCard.className = 'month-card'; 
            
            const monthNameDiv = document.createElement('div'); 
            monthNameDiv.className = 'month-name'; 
            monthNameDiv.textContent = monthNames[month]; 
            monthCard.appendChild(monthNameDiv); 
            
            const daysGrid = document.createElement('div'); 
            daysGrid.className = 'days-grid'; 
            
            dayLabels.forEach(label => { 
                const labelDiv = document.createElement('div'); 
                labelDiv.className = 'day-label'; 
                labelDiv.textContent = label; 
                daysGrid.appendChild(labelDiv); 
            }); 
            
            const firstDayIndex = new Date(currentYear, month, 1).getDay(); 
            const totalDays = new Date(currentYear, month + 1, 0).getDate(); 
            
            for (let i = 0; i < firstDayIndex; i++) { 
                const emptyDiv = document.createElement('div'); 
                emptyDiv.className = 'day empty'; 
                daysGrid.appendChild(emptyDiv); 
            } 
            
            const today = new Date(); 
            for (let day = 1; day <= totalDays; day++) {
    const dayDiv = document.createElement('div');
    dayDiv.className = 'day actual-day';
    dayDiv.textContent = day;
    
    const formattedMonth = String(month + 1).padStart(2, '0');
    const formattedDay = String(day).padStart(2, '0');
    dayDiv.dataset.date = `${currentYear}-${formattedMonth}-${formattedDay}`;

    if (day === today.getDate() && month === today.getMonth() && currentYear === today.getFullYear()) { 
        dayDiv.classList.add('today'); 
    } 

    dayDiv.addEventListener('click', function() {
        this.classList.toggle('selected-day');
        
        const selectedElements = document.querySelectorAll('.selected-day');
        
        const selectedDates = Array.from(selectedElements).map(el => el.dataset.date);
        
        localStorage.setItem('rsvpSelectedDates', JSON.stringify(selectedDates));
    });
    
    daysGrid.appendChild(dayDiv); 
}

            monthCard.appendChild(daysGrid); 
            calendarGrid.appendChild(monthCard); 


        } 
        


    </script> 
    <button type="button" class="btn btn-primary mt-3" onClick="window.location.href='slime-set.html'">Select slime meetup(s)</button>
</div> 
</body> 
</html>
