<!DOCTYPE html> 
<html> 
    <head> 
        <meta charset="UTF-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <title>Full Year Calendar</title> 
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="style.css" rel="stylesheet"> 

        <style>
            .day.actual-day {
                cursor: pointer; 
                transition: background-color 0.2s ease;
            }
            
            .day.actual-day:hover {
                background-color: #f0f0f0; 
            }

            .day.actual-day.selected-day {
                background-color: #fff2bc !important;
                border-radius: 4px;
            }
            button {
                background-color: white;
                color: rgb(148, 0, 96);
                transition: background-color 0.3s ease, color 0.3s ease;
                border: none;
                border-radius: 10px;
                text-align: center;
            }
            button:hover {
                background-color: rgb(148, 0, 96);
                color: white;
            }
        </style> 
    </head> 

    <body> 

        <nav class="navbar navbar-expand-lg" style="width: 100%;">
            <div class="container">
                <a class="navbar-brand" href="shop.html">Slimy shop</a>
            </div>
            <div>
                <button onclick="window.location.href='calendar.html'">Calendar</button>
            </div>
        </nav>
        
        <h1 id="calendar-year">RSVP for 2026!</h1> <br>
        <div class="calendar-container" id="calendar-grid"></div> 
        
        <script> 
            const currentYear = new Date().getFullYear(); 
            const monthNames = [ 
                "January", "February", "March", "April", "May", "June", 
                "July", "August", "September", "October", "November", "December" 
            ]; 
            const dayLabels = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"]; 
            const calendarGrid = document.getElementById('calendar-grid'); 
            
            for (let month = 0; month < 12; month++) { 
                const monthCard = document.createElement('div'); 
                monthCard.className = 'month-card'; 
                
                const monthNameDiv = document.createElement('div'); 
                monthNameDiv.className = 'month-name'; 
                monthNameDiv.textContent = monthNames[month]; 
                monthCard.appendChild(monthNameDiv); 
                
                const daysGrid = document.createElement('div'); 
                daysGrid.className = 'days-grid'; 
                
                dayLabels.forEach(label => { 
                    const labelDiv = document.createElement('div'); 
                    labelDiv.className = 'day-label'; 
                    labelDiv.textContent = label; 
                    daysGrid.appendChild(labelDiv); 
                }); 
                
                const firstDayIndex = new Date(currentYear, month, 1).getDay(); 
                const totalDays = new Date(currentYear, month + 1, 0).getDate(); 
                
                for (let i = 0; i < firstDayIndex; i++) { 
                    const emptyDiv = document.createElement('div'); 
                    emptyDiv.className = 'day empty'; 
                    daysGrid.appendChild(emptyDiv); 
                } 
                
                const today = new Date(); 
                for (let day = 1; day <= totalDays; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'day actual-day';
        dayDiv.textContent = day;
        
        const formattedMonth = String(month + 1).padStart(2, '0');


        const formattedDay = String(day).padStart(2, '0');
        dayDiv.dataset.date = `${formattedMonth}-${formattedDay}-${currentYear}`;

        if (day === today.getDate() && month === today.getMonth() && currentYear === today.getFullYear()) { 
            dayDiv.classList.add('today'); 
        } 

        dayDiv.addEventListener('click', function() {
            this.classList.toggle('selected-day');
            
            const selectedElements = document.querySelectorAll('.selected-day');
            
            const selectedDates = Array.from(selectedElements).map(el => el.dataset.date);
            
            localStorage.setItem('rsvpSelectedDates', JSON.stringify(selectedDates));
        });
        
        daysGrid.appendChild(dayDiv); 
    }

                monthCard.appendChild(daysGrid); 
                calendarGrid.appendChild(monthCard); 
            } 
            


        </script>

        <button type="button" onClick="window.location.href='slime-set.html'">Select slime meetup(s)</button>    
        <button type="button" onClick="window.location.href='shop.html'">Back to Home</button>

    </body> 
</html>
