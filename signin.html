<!DOCTYPE html>
<html>  
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width">
        <title>Sign in/up</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="style.css" rel="stylesheet" >
        <script src="script.js"></script>

        
        <style>
            .submit {transition: color 0.3s ease, background-color 0.3s ease, transform 0.3s ease;}
            .submit:hover {
                background-color: rgb(148, 0, 96);
                color: white;
                transform: scale(1.1);
            }
            label {transition: font-size 0.3s ease, color 0.3s ease;}
            label:hover{font-size: 1.2rem; color: rgb(148, 0, 96);}
            h1 {transition: font-size 0.3s ease, color 0.3s ease;}
            h1:hover {font-size: 2.5rem; color: rgb(148, 0, 96);}

            

            .box-section {
    display:grid;
    place-items:center;}

        </style>
    </head>

    <body>
        <div class="bubble-container"></div>

        <nav class="navbar">
            <a class="navbar-brand" href="index.php">Slimy shop</a>
            <div>
                <button onclick="window.location.href='calendar.html'">Calendar</button>
                <button onclick="window.location.href='gallery.html'">Moments</button>
                <button onclick="window.location.href='signin.html'">Sign in/up</button>
            </div>
        </nav>
        <div class="signin">
            <h1>Sign in to your account</h1>
            <form id="signin-form">
                <label for="username">Username: </label>
                <input type="text" id="username" name="username" required><br><br>
                <label for="password">Password: </label>
                <input type="text" id="password" name="password" required><br><br>
                <input class="submit" type="submit" value="Sign In">
            </form>
        </div>
        <div class="signup">
            <h1>Sign up for a new account</h1>
            <form id="signup-form">
                <label for="new-username">Username:</label>
                <input type="text" id="new-username" name="new-username" required><br><br>
                <label for="new-password">Password:</label>
                <input type="password" id="new-password" name="new-password" required><br><br>            
                <input class="submit" type="submit" value="Sign Up">
            </form>
        </div>
        <script>
            const signinForm = document.getElementById('signin-form');
            const signupForm = document.getElementById('signup-form');

            signinForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const username = document.getElementById('username').value;
                localStorage.setItem('username', username);
                const password = document.getElementById('password').value;

                if(localStorage.getItem('username') == null || localStorage.getItem('password') == null) {alert('No account found, please sign up first!');}

                if (password === localStorage.getItem('password')) {
                    alert(`Signed in as ${username}`);
                    window.location.href = 'shop.html';  
                } 
                else {alert('Incorrect password, either sign up or try again!');}
                

            });

            signupForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const newUsername = document.getElementById('new-username').value;
                const newPassword = document.getElementById('new-password').value;
                localStorage.setItem('username', newUsername);
                localStorage.setItem('password', newPassword);
                alert(`Account created for ${newUsername} -- you can now sign in!`);
                signupForm.remove();
            });


        </script>
        <div class="box-section">
    
        <img src="images\chatbot.jpg" alt="chatbot" style="width: 100%; height: auto; margin-top: 80px;">
    </div>

        </div>
<div class="bubble-container"></div>

    </body>
</html>
