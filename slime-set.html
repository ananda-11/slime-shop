<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RSVP Confirmation Page</title>
    <link href="style.css" rel="stylesheet"> 
    <style>
        h1 {
            text-align: left;
            font-size: 2rem;
        }
    </style>
</head>
<body>

    <h1>Your slime meetups have been selected for: </h1>
    <ul id="display-dates-list">
    </ul>

    <script>
        const storedDatesData = localStorage.getItem('rsvpSelectedDates');
        const chosenDates = storedDatesData ? JSON.parse(storedDatesData) : [];
        const listContainer = document.getElementById('display-dates-list');

        if (chosenDates.length === 0) {
            listContainer.innerHTML = "<li>No dates selected yet! Go back to the calendar </li>";
        } else {
            chosenDates.forEach(dateString => {
                const listItem = document.createElement('li');
                listItem.textContent = dateString; 
                listContainer.appendChild(listItem);
            });

            
        }        
        
        function clearSelectedDates() {
            localStorage.removeItem('rsvpSelectedDates');
            window.location.reload();
        }
    </script>
    <h4>Thank you for RSVPing! We look forward to seeing you at the slime meetups!</h4>
    <button onClick="window.location.href='calendar.html'">Back to Calendar</button>
    <button onClick="window.location.href='shop.html'">Back to home</button>
    <button onClick="clearSelectedDates()">Clear Selected Dates</button>
    <button onclick="window.location.href='gallery.html'">Moments</button>

</body>
</html>
